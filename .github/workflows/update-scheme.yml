name: Update Color Scheme

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC — switch to light scheme
    - cron: '0 18 * * *'  # 18:00 UTC — switch to dark scheme
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-scheme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate page with current color scheme
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: go run ./cmd/generator

      - name: Commit updated page if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet && echo "No changes." || \
            git commit -m "chore: update color scheme [skip ci]"

      - name: Push changes
        run: git push
